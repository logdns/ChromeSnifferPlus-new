<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title i18n-content="extShortName"></title>
		<link rel="stylesheet" type="text/css" href="css/options.css">
    	<script src="js/i18n_template_no_process.js"></script>
	</head>
	<body>
		<div id="head" class="box">
			<h1 i18n-content="extShortName"></h1>
		</div>

		<div id="instructions" class="box">
	        <h2 style="text-align: left;" i18n-content="extIntroTitle"></h2>
	        <p i18n-content="extIntroduction"></p>
	        <ul>
	            <li><p i18n-content="extIntroductionJavascript"></p></li>
	            <li><p i18n-content="extIntroductionWebAPI"></p></li>
	            <li><p i18n-content="extIntroductionWebFramework"></p></li>
	            <li><p i18n-content="extIntroductionWebSever"></p></li>
	        </ul>
			<div id="remote_detector_options">
				<h2 style="text-align: left;" i18n-content="remoteDetectorOptionsTitle"></h2>
				<p i18n-content="remoteDetectorOptionsIntro"></p>
				<label>
					<span i18n-content="remoteDetectorProviderLabel"></span>
					<select id="remote_detector_provider">
						<option value="technologychecker">TechnologyChecker Free</option>
						<option value="builtwith">BuiltWith Free API</option>
					</select>
				</label>
				<label>
					<span i18n-content="technologyCheckerApiKeyLabel"></span>
					<input id="technology_checker_api_key" type="password" autocomplete="off">
				</label>
				<label>
					<span i18n-content="builtwithFreeApiKeyLabel"></span>
					<input id="builtwith_free_api_key" type="password" autocomplete="off">
				</label>
				<button id="remote_detector_save" type="button" i18n-content="optionsSave"></button>
				<span id="remote_detector_status"></span>
			</div>
	        <div id="credits" style="padding:20px;">
				<hr>
				<p>
					<span style="font-weight:bold;" i18n-content="extIntroductionSource"></span>
					<span><a href="https://github.com/logdns/ChromeSnifferPlus-new" target="_blank">https://github.com/logdns/ChromeSnifferPlus-new</a></span>
				</p>
				<p>
					<span style="font-weight:bold;" i18n-content="extIntroductionUpstream"></span>
					<span><a href="https://github.com/justjavac/ChromeSnifferPlus" target="_blank">https://github.com/justjavac/ChromeSnifferPlus</a></span>
				</p>
			</div>

	        <p style="color:red;font-weight:bold;" i18n-content="extIntroductionNotice"></p>
			<p style="font-weight:bold;height: 50px;"><span i18n-content="extIntroductionDeveloper"></span><a href="https://github.com/logdns/ChromeSnifferPlus-new/issues" target="_blank" i18n-content="extIntroductionIssues"></a>. (<span style="color:red" i18n-content="extIntroductionThanks"></span>) </p>
	    </div>
		<script src="js/analytics.js"></script>
		<script src="js/common.js"></script>
		<script src="js/options.js"></script>
	</body>
</html>
